<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情绪日记 - 管理后台</title>
  <style>
    :root {
      --bg: #f5f5f5; --card: #fff; --primary: #7BAE7A; --text: #333;
      --text2: #888; --border: #eee; --radius: 14px; --shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: var(--card); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); width: 320px; text-align: center; }
    .login-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
    .login-card p { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 12px; }
    .login-card button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary); color: #fff; font-size: 16px; cursor: pointer; }
    .login-card .error { color: #e06060; font-size: 13px; margin-top: 8px; }
    .dashboard { display: none; max-width: 700px; margin: 0 auto; padding: 24px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .dash-header h1 { font-size: 22px; font-weight: 500; }
    .dash-header button { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); cursor: pointer; font-size: 13px; }
    .stat-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); text-align: center; margin-bottom: 16px; }
    .stat-card .num { font-size: 28px; font-weight: 600; color: var(--primary); }
    .stat-card .label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .section { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
    .section h2 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }
    .section .item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .section .item:last-child { border-bottom: none; }
    .section .item .content { flex: 1; font-size: 14px; line-height: 1.6; }
    .section .item .time { font-size: 11px; color: var(--text2); white-space: nowrap; }
    .empty { text-align: center; color: var(--text2); padding: 20px; font-size: 14px; }
  </style>
</head>
<body>

<div class="login" id="login-screen">
  <div class="login-card">
    <h1>🌙 情绪日记</h1>
    <p>管理后台</p>
    <input type="password" id="admin-password" placeholder="请输入管理密码" autofocus>
    <button onclick="login()">进入后台</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <h1>📊 用户反馈</h1>
    <div style="display:flex;gap:8px">
      <button onclick="refresh()">刷新</button>
      <button onclick="logout()">退出</button>
    </div>
  </div>
  <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">反馈总数</div></div>
  <div class="section">
    <h2>📝 所有反馈</h2>
    <div id="feedback-list"><div class="empty">加载中...</div></div>
  </div>
</div>

<script>
// ══════ 配置 ══════
const API_URL = 'https://cerulean-cheesecake-665fbb.netlify.app/.netlify/functions/feedback';
const ADMIN_PASSWORD = 'ray171215.';

// ══════ 登录 ══════
window.login = function() {
  const pwd = document.getElementById('admin-password').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin-auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').textContent = '密码错误';
  }
};

window.logout = function() { sessionStorage.removeItem('admin-auth'); location.reload(); };
window.refresh = function() { loadData(); };

if (sessionStorage.getItem('admin-auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

// ══════ 加载数据 ══════
async function loadData() {
  const list = document.getElementById('feedback-list');
  list.innerHTML = '<div class="empty">加载中...</div>';
  try {
    const res = await fetch(API_URL + '?pw=' + ADMIN_PASSWORD);
    if (res.status === 401) { list.innerHTML = '<div class="empty">密码错误</div>'; return; }
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.length;
    if (data.length === 0) {
      list.innerHTML = '<div class="empty">暂无反馈</div>';
    } else {
      list.innerHTML = data.reverse().map(f => `
        <div class="item">
          <div class="content">${esc(f.content)}</div>
          <div class="time">${(f.created_at||'').slice(0,10)}</div>
        </div>
      `).join('');
    }
  } catch(e) {
    list.innerHTML = '<div class="empty" style="color:#e06060">连接失败，请确认 Vercel 已部署</div>';
  }
}

function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
